title: 자료실
permalink: /resources/
---

<div class="page-header">
  <h1>자료실</h1>
  <p>포피스의 자료를 내려받으세요</p>
</div>

<div class="tabs">
  <a class="tab" href="/notice/">공지사항</a>
  <a class="tab active" href="/resources/">자료실</a>
  <a class="tab" href="/gallery/">사진첩</a>
</div>

<div class="content">
  {%- for post in collections.resources | reverse -%}
  <a class="resource-item" href="{{ post.data.file }}" download>
    <div class="resource-icon">📄</div>
    <div>
      <div class="resource-name">{{ post.data.title }}</div>
      <div class="resource-date">{{ post.data.date }}</div>
    </div>
    <span class="resource-dl">↓ 다운로드</span>
  </a>
  {%- endfor -%}
</div>
