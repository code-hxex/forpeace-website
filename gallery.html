---
layout: base.html
title: 사진첩
permalink: /gallery/
---

<div class="page-header">
  <h1>사진첩</h1>
  <p>포피스의 활동 사진을 모아봤어요</p>
</div>

<div class="tabs">
  <a class="tab" href="/notice/">공지사항</a>
  <a class="tab" href="/resources/">자료실</a>
  <a class="tab active" href="/gallery/">사진첩</a>
</div>

<div class="content-wide">
  <div class="grid">
  {%- for post in collections.gallery | reverse -%}
    <a class="card" href="{{ post.url }}">
      <div class="card-img">
        {% if post.data.thumbnail %}
          <img src="{{ post.data.thumbnail }}" alt="{{ post.data.title }}" />
        {% endif %}
      </div>
      <div class="card-body">
        <span class="card-tag">{{ post.data.category }}</span>
        <div class="card-title">{{ post.data.title }}</div>
        <div class="card-date">{{ post.data.date }}</div>
      </div>
    </a>
  {%- endfor -%}
  </div>
</div>
